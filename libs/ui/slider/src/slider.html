<div
  #track
  class="gui-slider-track"
  (pointerdown)="onPointerDown($event)"
  (pointermove)="onPointerMove($event)"
  (pointerup)="onPointerUp()"
  (pointercancel)="onPointerUp()"
  (lostpointercapture)="onPointerUp()"
>
  <!-- Optional inset icon — standard variant only, sizes M/L/XL (M3). -->
  @if (canInsetIcon()) {
    <span class="gui-slider-inset-icon" aria-hidden="true">
      <ng-content select="[gui-slider-icon]" />
    </span>
  }

  <!-- Track segments: active fill + inactive remainder as separate rounded pills
       with a gap on the handle side(s). One renderer covers standard, centered
       and range; the gap is carved per-edge from --gui-slider-gap. -->
  @for (seg of segments(); track $index) {
    <span
      class="gui-slider-seg"
      [class.gui-slider-seg-active]="seg.kind === 'active'"
      aria-hidden="true"
      [style.--gui-slider-seg-start.%]="seg.start"
      [style.--gui-slider-seg-end.%]="seg.end"
      [style.--gui-slider-seg-gap-start]="
        seg.gapStart ? 'var(--gui-slider-gap)' : '0px'
      "
      [style.--gui-slider-seg-gap-end]="
        seg.gapEnd ? 'var(--gui-slider-gap)' : '0px'
      "
    ></span>
  }

  <!-- Stop indicators (the M3 "stops" configuration). Ticks over the active fill
       read on-primary; ticks over the inactive track read on-secondary-container. -->
  @for (tick of ticks(); track $index) {
    <span
      class="gui-slider-tick"
      [class.gui-slider-tick-active]="tick.active"
      aria-hidden="true"
      [style.--gui-slider-pos.%]="tick.pos"
    ></span>
  }

  <!-- Handles. The interaction layer (state layer / ripple / focus ring) mounts
       on the rounded handle-state capsule (the role=slider keyboard-focus target),
       with the 4dp nub as a child — mirroring checkbox/radio/switch so the state
       layer and focus ring read as a rounded shape around the handle, not a 4dp
       sliver. The value indicator is a SIBLING of the capsule (not a child) so the
       capsule's overflow:hidden never clips it. -->
  @for (h of handles(); track h.thumb) {
    <div
      class="gui-slider-handle"
      [class.gui-slider-thumb-dragging]="isDragging(h.thumb)"
      [style.--gui-slider-pos.%]="h.pos"
    >
      <div
        class="gui-slider-thumb-state"
        guiStateLayer
        guiRipple
        guiFocusRing
        role="slider"
        [tabindex]="disabled() ? -1 : 0"
        [attr.aria-orientation]="
          orientation() === 'vertical' ? 'vertical' : null
        "
        [attr.aria-label]="thumbAriaLabel(h.thumb)"
        [attr.aria-labelledby]="thumbAriaLabelledby(h.thumb)"
        [attr.aria-valuemin]="h.min"
        [attr.aria-valuemax]="h.max"
        [attr.aria-valuenow]="h.value"
        [attr.aria-valuetext]="valueText(h.value)"
        [attr.aria-disabled]="disabled() ? 'true' : null"
        (keydown)="onKeyDown($event, h.thumb)"
        (keyup)="onKeyUp($event)"
        (blur)="control.markTouched()"
      >
        <span class="gui-slider-thumb" aria-hidden="true"></span>
      </div>
      @if (valueIndicator()) {
        <span class="gui-slider-value" aria-hidden="true">{{
          display(h.value)
        }}</span>
      }
    </div>
  }
</div>
