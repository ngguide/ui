<!-- The field body forwards pointer clicks to the input (native label-style
     focus convenience). Keyboard users operate the focusable input directly, so
     no key handler or extra tab stop belongs on this container. -->
<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<div class="gui-text-field-container" (click)="onContainerClick($event)">
  <span class="gui-text-field-leading">
    <ng-content select="[guiTextFieldLeading]" />
  </span>

  <div class="gui-text-field-middle">
    <!-- eslint-disable-next-line @angular-eslint/template/label-has-associated-control -->
    <label class="gui-text-field-label" [id]="labelId">
      {{ label() }}@if (required()) {<span aria-hidden="true">&nbsp;*</span>}
    </label>

    @if (prefix()) {
      <span class="gui-text-field-prefix">{{ prefix() }}</span>
    }

    <ng-content />

    @if (suffix()) {
      <span class="gui-text-field-suffix">{{ suffix() }}</span>
    }
  </div>

  <span class="gui-text-field-trailing">
    <ng-content select="[guiTextFieldTrailing]" />
  </span>
</div>

<div class="gui-text-field-supporting">
  <span
    class="gui-text-field-supporting-text"
    [id]="supportingId"
    [attr.role]="error() && errorText() ? 'alert' : null"
  >
    @if (error() && errorText()) {
      {{ errorText() }}
    } @else {
      {{ supportingText() }}
    }
  </span>

  @if (counter()) {
    <span class="gui-text-field-counter" [id]="counterId">{{ counter() }}</span>
  }
</div>
