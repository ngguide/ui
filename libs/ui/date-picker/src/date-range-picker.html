<div class="gui-date-range-picker-trigger">
  <gui-text-field
    variant="outlined"
    label="Start date"
    [error]="startError()"
    errorText="Invalid date"
    [supportingText]="dateFormatHint()"
  >
    <input
      guiTextFieldInput
      [value]="displayStart()"
      aria-label="Start date"
      (change)="onStartInput($any($event.target).value)"
    />
  </gui-text-field>

  <gui-text-field
    variant="outlined"
    label="End date"
    [error]="endError()"
    errorText="Invalid date"
    [supportingText]="dateFormatHint()"
  >
    <input
      guiTextFieldInput
      [value]="displayEnd()"
      aria-label="End date"
      (change)="onEndInput($any($event.target).value)"
    />
  </gui-text-field>

  <button
    gui-icon-button
    type="button"
    [attr.aria-label]="'Open calendar'"
    [disabled]="control.effectiveDisabled()"
    (click)="open()"
  >
    <gui-icon
      ><svg
        viewBox="0 -960 960 960"
        width="24"
        height="24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          d="M200-80q-33 0-56.5-23.5T120-160v-560q0-33 23.5-56.5T200-800h40v-80h80v80h320v-80h80v80h40q33 0 56.5 23.5T840-720v560q0 33-23.5 56.5T760-80H200Zm0-80h560v-400H200v400Zm0-480h560v-80H200v80Z"
        /></svg
    ></gui-icon>
  </button>
</div>

<ng-template #panel>
  <div class="gui-date-range-picker-panel" role="dialog" aria-modal="true">
    <div class="gui-date-range-picker-header">
      <span class="gui-date-range-picker-supporting">{{ label() }}</span>
      <span class="gui-date-range-picker-headline">{{ headlineText() }}</span>
    </div>

    @if (variant() === 'modal-input') {
      <div class="gui-date-range-picker-inputs">
        <gui-text-field
          variant="outlined"
          label="Start date"
          [error]="startError()"
          errorText="Invalid date"
          [supportingText]="dateFormatHint()"
        >
          <input
            guiTextFieldInput
            [value]="pendingStartDisplay()"
            aria-label="Start date"
            (change)="onModalStartInput($any($event.target).value)"
          />
        </gui-text-field>
        <gui-text-field
          variant="outlined"
          label="End date"
          [error]="endError()"
          errorText="Invalid date"
          [supportingText]="dateFormatHint()"
        >
          <input
            guiTextFieldInput
            [value]="pendingEndDisplay()"
            aria-label="End date"
            (change)="onModalEndInput($any($event.target).value)"
          />
        </gui-text-field>
      </div>
    }

    <div class="gui-date-range-picker-divider"></div>

    @if (variant() !== 'modal-input') {
      <div class="gui-date-range-picker-subhead">{{ monthSubhead() }}</div>
    }

    <gui-calendar
      [(activeMonth)]="activeMonth"
      [rangeStart]="pendingStart()"
      [rangeEnd]="pendingEnd()"
      [min]="min()"
      [max]="max()"
      [dateFilter]="dateFilter()"
      [locale]="locale()"
      [today]="today"
      (dateSelected)="onDateSelected($event)"
    />

    <div class="gui-date-range-picker-actions">
      <button gui-button variant="text" type="button" (click)="close()">
        Cancel
      </button>
      <button gui-button variant="text" type="button" (click)="onConfirm()">
        OK
      </button>
    </div>
  </div>
</ng-template>
