<!-- Top app bar -->
<header class="shell-bar">
  <app-switcher class="shell-switcher" />

  <gui-text-field class="shell-search" variant="outlined">
    <gui-icon class="sym" guiTextFieldLeading>search</gui-icon>
    <input
      guiTextFieldInput
      type="search"
      placeholder="Search"
      aria-label="Search"
      [ngModel]="query()"
      (ngModelChange)="query.set($event)"
    />
  </gui-text-field>

  <span class="shell-spacer"></span>

  <gui-switch
    class="shell-dark"
    aria-label="Dark theme"
    guiTooltip="Toggle dark theme"
    [checked]="theme.isDark()"
    (checkedChange)="setMode($event === true)"
  >
    <gui-icon class="sym" guiSwitchIcon>light_mode</gui-icon>
    <gui-icon class="sym" guiSwitchSelectedIcon>dark_mode</gui-icon>
  </gui-switch>

  <button
    gui-icon-button
    variant="standard"
    [cdkMenuTriggerFor]="seedMenu"
    aria-label="Brand color"
    guiTooltip="Brand color"
  >
    <gui-icon class="sym">palette</gui-icon>
  </button>

  <span [guiBadge]="3" class="shell-badge-host">
    <button
      gui-icon-button
      variant="standard"
      aria-label="Notifications, 3 unread"
      guiTooltip="Notifications"
    >
      <gui-icon class="sym">notifications</gui-icon>
    </button>
  </span>

  <button
    gui-icon-button
    variant="standard"
    [cdkMenuTriggerFor]="accountMenu"
    aria-label="Account"
    guiTooltip="Account"
  >
    <gui-icon class="sym">account_circle</gui-icon>
  </button>
</header>

<div class="shell-body">
  <!-- Navigation rail (expanded width). The keydown drives the roving tab stop
       and is delegated from the focusable rail items below (WAI-ARIA roving
       tabindex), so the landmark itself need not be focusable. -->
  <!-- eslint-disable-next-line @angular-eslint/template/interactive-supports-focus -->
  <nav class="shell-rail" aria-label="Primary" (keydown)="onRailKeydown($event)">
    @for (item of activeApp().nav; track item.path) {
      <a
        appNavItem
        [label]="item.label"
        [routerLink]="item.path"
        routerLinkActive="is-active"
        ariaCurrentWhenActive="page"
      >
        <gui-icon class="sym shell-rail-icon">{{ item.icon }}</gui-icon>
        <span class="shell-rail-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <main class="shell-content" id="main-content" cdkScrollable>
    <router-outlet />
  </main>
</div>

<!-- Bottom navigation bar (compact width) -->
<nav class="shell-bottom" aria-label="Primary">
  @for (item of activeApp().nav; track item.path) {
    <a
      class="shell-bottom-item"
      [routerLink]="item.path"
      routerLinkActive="is-active"
      ariaCurrentWhenActive="page"
    >
      <gui-icon class="sym">{{ item.icon }}</gui-icon>
      <span class="shell-bottom-label">{{ item.label }}</span>
    </a>
  }
</nav>

<!-- Overlay menus -->
<ng-template #seedMenu>
  <div gui-menu cdkMenu>
    @for (s of theme.seeds; track s.value) {
      <button gui-menu-item (click)="theme.setSeed(s.value)">
        <span
          class="shell-seed-dot"
          guiMenuItemLeading
          [style.background]="s.value"
        ></span>
        {{ s.name }}
      </button>
    }
  </div>
</ng-template>

<ng-template #accountMenu>
  <div gui-menu cdkMenu>
    <button gui-menu-item>
      <gui-icon class="sym" guiMenuItemLeading>person</gui-icon>
      Profile
    </button>
    <button gui-menu-item>
      <gui-icon class="sym" guiMenuItemLeading>tune</gui-icon>
      Preferences
    </button>
    <gui-menu-divider />
    <button gui-menu-item>
      <gui-icon class="sym" guiMenuItemLeading>logout</gui-icon>
      Sign out
    </button>
  </div>
</ng-template>
