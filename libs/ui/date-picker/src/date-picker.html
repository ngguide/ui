<gui-text-field
  variant="outlined"
  [label]="label()"
  [error]="inputError()"
  errorText="Invalid date"
>
  <input
    guiTextFieldInput
    [value]="displayValue()"
    [readOnly]="!editable()"
    [attr.aria-label]="label()"
    (change)="onInput($any($event.target).value)"
  />
  <button
    gui-icon-button
    guiTextFieldTrailing
    type="button"
    [attr.aria-label]="'Open calendar'"
    [disabled]="control.effectiveDisabled()"
    (click)="open()"
  >
    <gui-icon>calendar_today</gui-icon>
  </button>
</gui-text-field>

<ng-template #panel>
  <div class="gui-date-picker-panel" role="dialog" aria-modal="true">
    @if (variant() === 'modal' || variant() === 'modal-input') {
      <div class="gui-date-picker-header">
        <span class="gui-date-picker-headline">{{ label() }}</span>
      </div>
      <div class="gui-date-picker-divider"></div>
    }

    @if (variant() === 'modal-input') {
      <div class="gui-date-picker-input">
        <gui-text-field
          variant="outlined"
          label="Date"
          [error]="inputError()"
          errorText="Invalid date"
        >
          <input
            guiTextFieldInput
            [value]="displayValue()"
            (change)="onInput($any($event.target).value)"
          />
        </gui-text-field>
      </div>
    } @else {
      <gui-calendar
        [(activeMonth)]="activeMonth"
        [selected]="pendingDate()"
        [min]="min()"
        [max]="max()"
        [dateFilter]="dateFilter()"
        [locale]="locale()"
        [today]="today"
        (dateSelected)="onDateSelected($event)"
      />
    }

    @if (variant() === 'modal' || variant() === 'modal-input') {
      <div class="gui-date-picker-actions">
        <button gui-button variant="text" type="button" (click)="close()">
          Cancel
        </button>
        <button gui-button variant="text" type="button" (click)="onConfirm()">
          OK
        </button>
      </div>
    }
  </div>
</ng-template>
