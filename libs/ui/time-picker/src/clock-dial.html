<svg
  #svg
  class="gui-clock-dial-svg"
  viewBox="0 0 256 256"
  width="256"
  height="256"
>
  <!-- Track from center to the active number. -->
  <line
    class="gui-clock-hand"
    [class.gui-clock-hand-animated]="animateHand()"
    x1="128"
    y1="128"
    [attr.x2]="handle().x"
    [attr.y2]="handle().y"
    aria-hidden="true"
  />

  <!-- Center dot (8px diameter). -->
  <circle class="gui-clock-center" cx="128" cy="128" r="4" aria-hidden="true" />

  <!-- Selector handle (48px diameter) at the active number. -->
  <circle
    class="gui-clock-handle"
    [attr.cx]="handle().x"
    [attr.cy]="handle().y"
    r="24"
    aria-hidden="true"
  />

  <!-- Numbers. -->
  @for (n of numbers(); track n.ring + ':' + n.unit) {
  <text
    class="gui-clock-number"
    [class.gui-clock-number-selected]="n.unit === currentUnit()"
    [attr.x]="n.x"
    [attr.y]="n.y"
    text-anchor="middle"
    dominant-baseline="central"
    aria-hidden="true"
  >
    {{ n.label }}
  </text>

  <!-- 48×48dp Button-role hit target per M3; r=24 in the 256dp viewBox. -->
  <circle
    class="gui-clock-target"
    role="button"
    tabindex="0"
    [attr.aria-label]="n.ariaLabel"
    [attr.aria-pressed]="n.unit === currentUnit()"
    [attr.cx]="n.x"
    [attr.cy]="n.y"
    r="24"
    (click)="selectUnit(n.unit)"
    (keydown)="onNumberKey($event, n.unit)"
  />
  }
</svg>
